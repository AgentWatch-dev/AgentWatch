name = "agentwatch-edge-proxy"
main = "src/index.ts"
compatibility_date = "2026-06-09"
compatibility_flags = [ "nodejs_compat" ]

assets = { directory = "./assets", binding = "ASSETS", run_worker_first = true }

routes = [
  { pattern = "your-domain.com", custom_domain = true }
]

# Secrets are managed via `wrangler secret put`. See SECRETS.md (gitignored) for full inventory.

[triggers]
crons = ["0 8 * * *"]

[vars]
ANTHROPIC_VERSION = "2023-06-01"
REPORT_FROM_EMAIL = "reports@your-domain.com"
REPORT_RECIPIENT_MAP = "{}"
# TENANT_TOKEN_MAP must be set via: wrangler secret put TENANT_TOKEN_MAP
# ADMIN_SECRET must be set via: wrangler secret put ADMIN_SECRET



[[durable_objects.bindings]]
name = "SESSION_TRACKER"
class_name = "SessionTracker"

[[durable_objects.bindings]]
name = "TENANT_BALANCE"
class_name = "TenantBalance"

[[durable_objects.bindings]]
name = "BUDGET_TRACKER"
class_name = "BudgetTracker"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionTracker"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TenantBalance"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["BudgetTracker"]

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }
[[kv_namespaces]]
binding = "KV"
id = "<YOUR_KV_NAMESPACE_ID>"

[[queues.producers]]
binding = "TELEMETRY_QUEUE"
queue = "agentwatch-telemetry"
[[queues.consumers]]
queue = "agentwatch-telemetry"
max_batch_size = 100
max_batch_timeout = 5
max_retries = 3
